# application.properties - Configuraçăo completa

# === CONFIGURAÇĂO DO BANCO H2 ===
spring.datasource.url=jdbc:h2:mem:bd_libras
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# === CONFIGURAÇĂO DE LOGGING ===
# Nível geral da aplicaçăo
logging.level.com.libras.backend=INFO

# Debug específico para quiz e seed
logging.level.com.libras.backend.quiz=DEBUG
logging.level.com.libras.backend.config.QuizDataInitializer=DEBUG
logging.level.com.libras.backend.service.PerguntaService=DEBUG

# SQL queries (útil para debug)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# HTTP requests (útil para debug de endpoints)
logging.level.org.springframework.web=DEBUG

# Pattern do console (mais limpo)
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n

# Arquivo de log (opcional, para desenvolvimento)
logging.file.name=logs/libralingo.log
logging.file.max-size=10MB
logging.file.max-history=7

# === CONFIGURAÇĂO DO SERVIDOR ===
server.port=8080

# === CONFIGURAÇĂO JPA ===
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === CONFIGURAÇĂO DE VALIDAÇĂO ===
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false